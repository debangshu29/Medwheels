<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* Existing CSS copied from the signup form */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #ecf0f3;
            overflow-y: auto;
        }

        .container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 20px 100px;
            background: rgb(250 236 255);
        }

        .container-box {
            width: 60%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 13px 13px 20px #ddc6ef, -13px -13px 20px #ffddf7;
            background: rgb(248 242 250);
            overflow-y: auto;
            max-height: 90vh;
        }

        .container-right {
            width: 95%;
            height: 95%;
            background: linear-gradient(rgb(0 0 0 / 9%), #090909e0), url(/static/login1.jpg) no-repeat;
            background-size: cover;
            background-position: center;
            margin: 10px;
            padding: 40% 20%;
            text-align: center;
        }

        .container-right h1 {
            color: white;
            padding-bottom: 25px;
        }

        .container-right p {
            color: white;
        }

        .container-left {
            padding: 15px 20px;
        }

        .container-left h2 {
            position: relative;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }

        .container-left h2:after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            height: 4px;
            width: 50px;
            border-radius: 2px;
            background-color: rgb(255, 112, 60);
        }

        .field {
            background: #fff;
            margin: 7px 0;
            display: flex;
            align-items: center;
            border-radius: 25px;
            box-shadow: inset 8px 8px 8px #e9e9e9, inset -8px -8px 8px #fff;
        }

        .field input,
        .field select {
            width: 100%;
            background: transparent;
            border: 0;
            outline: 0;
            padding: 18px 15px;
            font-size: 18px;
        }

        .field i {
            margin-left: 15px;
            color: #999;
            font-size: 20px;
        }

        .btn {
            outline: none;
            border: none;
            cursor: pointer;
            width: 100%;
            height: 47px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            background-color: rgb(255, 112, 60);
            box-shadow: 3px 3px 8px #b1b1b1, -3px -3px 8px #ffffff;
            transition: all 0.5s;
        }

        .btn:hover {
            background-color: #ff9595;
        }

        .btn:active {
            background-color: #ff9595;
        }

        .check {
            text-align: left;
            font-size: 15px;
        }

        .option {
            font-size: 15px;
            padding-top: 20px;
        }

        .option a {
            text-decoration: none;
            color: rgb(255, 112, 60);
            font-size: 16px;
        }

        .option a:hover {
            color: #ff9595;
        }

        @media only screen and (max-width: 767px) {
            .container {
                padding: 20px;
            }

            .container-box {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto;
                grid-auto-flow: dense;
                width: 100%;
                height: auto;
                padding: 10px;
            }

            .container-right {
                padding: 20px;
                height: auto;
                order: 1;
            }

            .container-left {
                padding: 20px 15px;
                order: 2;
            }

            .container-right h1 {
                font-size: 1.5rem;
            }

            .container-right p {
                font-size: 1rem;
            }

            .container-left h2 {
                font-size: 1.5rem;
            }

            .field input,
            .field select {
                padding: 15px 10px;
                font-size: 1rem;
            }

            .btn {
                height: 45px;
                font-size: 1rem;
            }

            .check,
            .option {
                font-size: 0.9rem;
            }
        }

        @media only screen and (max-width: 480px) {
            .container-left h2 {
                font-size: 1.2rem;
            }

            .container-right h1 {
                font-size: 1.2rem;
            }

            .container-right p {
                font-size: 0.9rem;
            }

            .field input,
            .field select {
                padding: 12px 8px;
                font-size: 0.9rem;
            }

            .btn {
                height: 40px;
                font-size: 0.9rem;
            }

            .check,
            .option {
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="container-box">
            <div class="container-right">
                <h1>Edit Profile</h1>
                <p>Update your information to ensure you provide the best service with MedWheels.</p>
            </div>
            <div class="container-left">
                <h2>Profile Details</h2>
                <form method="POST" enctype="multipart/form-data" action="{% url 'edit_profile' %}">
                    {% csrf_token %}
                    <div class="field">
                        <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}" placeholder="First Name" required>
                    </div>
                    <div class="field">
                        <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}" placeholder="Last Name" required>
                    </div>
                    <div class="field">
                        <i class="fa-solid fa-phone"></i>
                        <input type="text" id="phone" name="phone" value="{{ user.phone_number }}" placeholder="Phone Number" required>
                    </div>
                    <div class="field">
                        <i class="fa-solid fa-id-card"></i>
                        <input type="text" id="license_number" name="license_number" value="{{ driver.license_number }}" placeholder="License Number" required>
                    </div>
                    <div class="field">
                        <input type="text" id="number_plate" name="number_plate" value="{{ driver.number_plate }}" placeholder="Number Plate" required>
                    </div>
                    <div class="field">
                        <i class="fa-solid fa-truck-medical"></i>
                        <select id="ambulance_type" name="ambulance_type">
                            <option value="med_bls" {% if driver.ambulance_type == 'med_bls' %}selected{% endif %}>Med BLS</option>
                            <option value="med_als" {% if driver.ambulance_type == 'med_als' %}selected{% endif %}>Med ALS</option>
                            <option value="med_icu" {% if driver.ambulance_type == 'med_icu' %}selected{% endif %}>Med ICU</option>
                        </select>
                    </div>
                    <div class="field">
                        <i class="fa-solid fa-car"></i>
                        <input type="text" id="car_name" name="car_name" value="{{ driver.car_name }}" placeholder="Car Name">
                    </div>
                    <div class="field">
                        <i class="fa-solid fa-image"></i>
                        <input type="file" id="profile_image" name="profile_image" placeholder="Profile Image">
                    </div>
                    <input type="submit" value="Save Changes" class="btn">
                </form>
            </div>
        </div>
    </div>
</body>

</html>
